<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elk Flipbook Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: radial-gradient(circle at 20% 20%, #0b1223 0, #0c152c 40%, #0b172f 100%);
        --panel: #f8fafc;
        --muted: #4b5563;
        --accent: #f59e0b;
        --accent-strong: #f97316;
        --border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Manrope', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: #0f172a;
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 56px;
      }

      .hero {
        display: flex;
        align-items: flex-end;
        gap: 16px;
        justify-content: space-between;
        padding: 20px 24px;
        border-radius: 16px;
        background: linear-gradient(120deg, rgba(255, 255, 255, 0.9), #f6f7fb);
        border: 1px solid var(--border);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent-strong);
        margin: 0 0 6px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        color: #0f172a;
      }

      .lede {
        margin: 0;
        color: var(--muted);
        max-width: 820px;
        line-height: 1.5;
      }

      .status {
        font-weight: 600;
        color: #0f172a;
        background: #fef3c7;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(249, 115, 22, 0.4);
        min-width: 140px;
        text-align: center;
      }

      .controls {
        margin: 16px 0 12px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .control-card {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        flex-wrap: wrap;
      }

      label {
        display: block;
        font-weight: 600;
        color: #111827;
        margin-bottom: 4px;
      }

      input[type='search'] {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        min-width: 240px;
        font-size: 15px;
        font-family: inherit;
        background: #fff;
      }

      details.hits {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #fff;
        padding: 8px 12px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
      }

      details.hits summary {
        cursor: pointer;
        font-weight: 700;
        color: #0f172a;
        outline: none;
      }

      .hits__list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
      }

      .hit-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.1s ease, box-shadow 0.1s ease;
        text-align: left;
      }

      .hit-item:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
      }

      .hit-item__page {
        font-weight: 700;
        color: #f97316;
      }

      .hit-item__snippet {
        flex: 1;
        color: #374151;
        font-size: 14px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        color: #0f172a;
        background: linear-gradient(90deg, #fbbf24, #f97316);
        box-shadow: 0 10px 20px rgba(249, 115, 22, 0.25);
      }

      button.secondary {
        background: #e2e8f0;
        box-shadow: none;
        color: #0f172a;
      }

      #viewer {
        margin-top: 12px;
        height: 720px;
      }

      .viewer-card {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 16px;
        padding: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.12);
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        h1 {
          font-size: 24px;
        }

        .hero {
          flex-direction: column;
          align-items: flex-start;
        }

        input[type='search'] {
          min-width: 0;
          width: 100%;
        }

        #viewer {
          height: 480px;
        }

        .viewer-card {
          padding: 8px;
          border-radius: 12px;
        }
      }

      @media (max-width: 480px) {
        .shell {
          padding: 12px 10px 32px;
        }

        #viewer {
          height: 400px;
        }

        .control-card {
          padding: 10px;
          gap: 8px;
        }

        button {
          padding: 8px 12px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Elk flipbook</p>
          <h1>PDF to flipbook with search + OCR fallback</h1>
          <p class="lede">
            Drop a PDF, keep the text searchable, and get a tactile page-turning experience with optional
            hard covers. This demo uses the public TraceMonkey PDF as a stand-in source.
          </p>
        </div>
        <div class="status" id="status">Loading…</div>
      </header>

      <section class="controls">
        <form id="search-form" class="control-card">
          <div>
            <label for="search-term">Search text</label>
            <input id="search-term" type="search" name="query" placeholder="Find text…" />
          </div>
          <div class="meta" id="search-count">—</div>
          <div class="controls">
            <button type="submit">Search</button>
            <button type="button" class="secondary" id="hit-prev">Prev hit</button>
            <button type="button" class="secondary" id="hit-next">Next hit</button>
          </div>
        </form>
        <details class="hits" open>
          <summary>Results</summary>
          <div id="hits-list" class="hits__list">No matches yet</div>
        </details>

        <div class="control-card">
          <button type="button" class="secondary" id="prev-page">Prev page</button>
          <button type="button" class="secondary" id="next-page">Next page</button>
        </div>
      </section>

      <section class="viewer-card">
        <div id="viewer" aria-label="Flipbook viewer"></div>
      </section>
    </main>

    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
